---
- name: Instalación y Configuración Automática de Nodo n8n
  hosts: all
  become: yes
  tasks:
    - name: FASE 1 - Instalar Docker y dependencias
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
          - curl
          - git
        state: present
        update_cache: yes

    - name: FASE 2 - Crear carpetas de persistencia y datos
      file:
        path: "/opt/servicios/nodo-app-n8n/{{ item }}"
        state: directory
        mode: '0755'
        owner: "1000"
        group: "1000"
      with_items:
        - 'n8n_data'

    - name: FASE 3 - Crear estructura de backups
      file:
        path: "/opt/servicios/nodo-app-n8n/backups/n8n_files"
        state: directory
        mode: '0755'
        recurse: yes

    - name: FASE 4 - Pull de imagen de n8n
      shell: "docker pull n8nio/n8n:latest"

    - name: FASE 5 - Lanzamiento del servicio
      shell: "cd /opt/servicios/nodo-app-n8n && docker compose up -d"

    - name: FASE 6 - Verificar estado de los contenedores
      shell: "docker ps | grep n8n"
