---
- name: Despliegue Automatizado de n8n Community Edition
  hosts: automation_server
  tasks:
    - name: Asegurar que el directorio de datos local exista con los permisos correctos
      file:
        path: "../n8n_data"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"

    # FASE 5: Crear raíz jerárquica corporativa de Backups
    - name: FASE 5 - Asegurar existencia de la raiz de backups
      file:
        path: "../backups"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # FASE 6: Crear celda específica para n8n_files
    - name: FASE 6 - Asegurar existencia del directorio de salida n8n_files
      file:
        path: "../backups/n8n_files"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Detener contenedores previos si existen
      community.docker.docker_compose_v2:
        project_src: ".."
        state: absent
      ignore_errors: true

    - name: Desplegar y levantar el stack de n8n Core
      community.docker.docker_compose_v2:
        project_src: ".."
        state: present
        pull: always
