services:
  n8n_core:
    image: n8nio/n8n:latest
    container_name: n8n_backend
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      # Conexión al core de datos MySQL (.210)
      - DB_TYPE=${DB_TYPE}
      - DB_MYSQLDB_HOST=${DB_POSTGRESDB_HOST}  # Mapeado a la IP de la .210
      - DB_MYSQLDB_PORT=${DB_POSTGRESDB_PORT}  # Mapeado al 3306
      - DB_MYSQLDB_DATABASE=${DB_POSTGRESDB_DATABASE}
      - DB_MYSQLDB_USER=${DB_POSTGRESDB_USER}
      - DB_MYSQLDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
      # Llave de cifrado interna de credenciales
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - ./n8n_data:/home/node/.n8n
